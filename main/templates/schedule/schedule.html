<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="schedule.css">

</head>
<body>

    <div class="container">
        <form class="form-section" id="meetingForm">
            <h1 class="section-title">Meeting Details</h1>
            <div class="form-group">
                <label class="label">Meeting Name:</label>
                <input type="text" class="input-box" id="meetingName" required>
            </div>
            <div class="meeting-time-row">
                <div class="form-group" style="flex: 1;">
                    <label class="label">Date of Meeting:</label>
                    <input type="date" class="input-box" id="meetingDate" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="label">Time of Meeting:</label>
                    <input type="time" class="input-box" id="meetingTime" required>
                </div>
            </div>
            <div class="form-group">
                <label class="label">Platform:</label>
                <div class="platform-buttons">
                    <button type="button" class="platform-btn" data-value="Zoom">Zoom</button>
                    <button type="button" class="platform-btn" data-value="Google Meet">Google Meet</button>
                    <button type="button" class="platform-btn" data-value="In-Person">In-Person</button>
                    <input type="text" id="platformSelection" required>
                </div>
            </div>
            <div class="form-group">
                <label class="label">Participants:</label>
                <div class="participants-row">
                    <div class="search-input"><input type="text" id="participantInput" placeholder="Name..."></div>
                    <button type="button" class="add-btn" id="addParticipantBtn">+ADD</button>
                </div>
                <div class="participant-list" id="participantList"></div>
            </div>
            <div class="form-group">
                <label class="label">Message:</label>
                <textarea class="input-box message-box" id="meetingMessage"></textarea>
            </div>

            <div class="form-group">
                <label class="label">Repeat:</label>
                <div class="repeat-options">
                    <label class="radio-container">
                        <input type="radio" name="repeat" value="One-time" checked>
                        <span class="radio-custom"></span> One-time
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="repeat" value="Weekly">
                        <span class="radio-custom"></span> Weekly
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="repeat" value="Monthly">
                        <span class="radio-custom"></span> Monthly
                    </label>
                </div>
            </div>

            <hr class="divider">
            <div class="footer-actions">
                <button type="reset" class="btn btn-cancel">Cancel</button>
                <button type="submit" class="btn btn-schedule">Schedule Meeting</button>
            </div>
        </form>

        <div class="sidebar-section" id="upcomingMeetings">
            <div class="sidebar-title">Upcoming Meetings:</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <div class="modal-header" id="modalTitle">Meeting Details</div>
            <div class="modal-body" id="modalBody"></div>
            <button class="btn-cancel-meeting" id="cancelMeetingBtn">Cancel Meeting</button>
        </div>
    </div>

    <script>
        const meetingForm = document.getElementById('meetingForm');
        const platformButtons = document.querySelectorAll('.platform-btn');
        const hiddenPlatformInput = document.getElementById('platformSelection');
        const participantInput = document.getElementById('participantInput');
        const addParticipantBtn = document.getElementById('addParticipantBtn');
        const participantListContainer = document.getElementById('participantList');
        const upcomingMeetingsContainer = document.getElementById('upcomingMeetings');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        const cancelMeetingBtn = document.getElementById('cancelMeetingBtn');

        let participants = [];
        let scheduledMeetings = [];
        let currentViewingId = null; // Track which meeting is currently open in modal

        // Load Persistence
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('myMeetings');
            if (saved) {
                scheduledMeetings = JSON.parse(saved);
                renderSidebar();
            }
        });

        // Platform Selection
        platformButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                platformButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                hiddenPlatformInput.value = btn.getAttribute('data-value');
            });
        });

        // Participant Handling
        addParticipantBtn.addEventListener('click', () => {
            const name = participantInput.value.trim();
            if (name) {
                participants.push(name);
                renderParticipants();
                participantInput.value = '';
            }
        });

        function renderParticipants() {
            participantListContainer.innerHTML = '';
            participants.forEach((name, index) => {
                const chip = document.createElement('div');
                chip.className = 'participant-chip';
                chip.innerHTML = `${name} <span class="remove-participant" onclick="removeParticipant(${index})">&times;</span>`;
                participantListContainer.appendChild(chip);
            });
        }

        window.removeParticipant = (index) => {
            participants.splice(index, 1);
            renderParticipants();
        };

        // Form Submit
        meetingForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const repeatVal = document.querySelector('input[name="repeat"]:checked').value;

            const meetingData = {
                id: Date.now(),
                name: document.getElementById('meetingName').value,
                date: document.getElementById('meetingDate').value,
                time: document.getElementById('meetingTime').value,
                platform: hiddenPlatformInput.value,
                message: document.getElementById('meetingMessage').value || "None",
                participants: [...participants],
                repeat: repeatVal,
                color: ['blue', 'green', 'orange', 'purple'][Math.floor(Math.random() * 4)]
            };

            scheduledMeetings.push(meetingData);
            localStorage.setItem('myMeetings', JSON.stringify(scheduledMeetings));
            renderSidebar();

            meetingForm.reset();
            participants = [];
            renderParticipants();
            platformButtons.forEach(b => b.classList.remove('active'));
        });

        function renderSidebar() {
            // Keep the title, clear the items
            upcomingMeetingsContainer.innerHTML = '<div class="sidebar-title">Upcoming Meetings:</div>';
            scheduledMeetings.forEach(data => {
                const item = document.createElement('div');
                item.className = 'meeting-item';
                item.setAttribute('data-id', data.id);
                item.innerHTML = `
                    <div class="meeting-meta">
                        <div class="icon-box ${data.color}"></div>
                        <div class="meeting-details">
                            <span class="meeting-name">${data.name}</span>
                            <span class="meeting-platform">${data.platform}</span>
                            <span class="meeting-participants">${data.participants.length} participants</span>
                        </div>
                    </div>
                    <div class="meeting-time">${data.time}</div>
                `;
                upcomingMeetingsContainer.appendChild(item);
            });
        }

        // Modal/Cancel Logic
        upcomingMeetingsContainer.addEventListener('click', (e) => {
            const clickedItem = e.target.closest('.meeting-item');
            if (!clickedItem) return;

            currentViewingId = clickedItem.getAttribute('data-id');
            const data = scheduledMeetings.find(m => m.id == currentViewingId);

            if (data) {
                modalTitle.innerText = data.name;
                modalBody.innerHTML = `
                    <p><strong>Date:</strong> ${data.date}</p>
                    <p><strong>Time:</strong> ${data.time}</p>
                    <p><strong>Platform:</strong> ${data.platform}</p>
                    <p><strong>Repeat:</strong> ${data.repeat}</p>
                    <p><strong>Participants:</strong> ${data.participants.join(', ') || 'None'}</p>
                    <p><strong>Message:</strong> ${data.message}</p>
                `;
                modalOverlay.style.display = 'flex';
            }
        });

        cancelMeetingBtn.addEventListener('click', () => {
            if (currentViewingId) {
                // Filter out the meeting
                scheduledMeetings = scheduledMeetings.filter(m => m.id != currentViewingId);
                // Update LocalStorage
                localStorage.setItem('myMeetings', JSON.stringify(scheduledMeetings));
                // Refresh UI
                renderSidebar();
                modalOverlay.style.display = 'none';
            }
        });

        closeModal.addEventListener('click', () => modalOverlay.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target == modalOverlay) modalOverlay.style.display = 'none'; });
    </script>
</body>
</html>
